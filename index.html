<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Jungkat Jungkit</title>
    <style>
        /* Style the button */
        button {
            background-color: yellow; /* Yellow background */
            color: black; /* Black text color */
            font-size: 20px; /* Increase font size */
            padding: 15px 30px; /* Bigger button with more padding */
            border: none; /* Remove border */
            border-radius: 5px; /* Slightly rounded corners */
            cursor: pointer; /* Pointer cursor on hover */
        }

        /* Add hover effect */
        button:hover {
            background-color: gold; /* Slightly darker yellow on hover */
        }
    </style>
</head>
<body>

    <button onclick="openUrl()">Open Jungkat Jungkit</button>

    <script>
        function openUrl() {
            // This points to the folder "jungkat-jungkit" and the file "index.html" inside it
            window.location.href = 'jungkat-jungkit/index.html';
        }
    </script>

</body>
</html>
